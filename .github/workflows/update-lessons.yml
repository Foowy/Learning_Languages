name: Update Lesson Packs

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download jmdict-simplified data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE=$(gh api repos/scriptin/jmdict-simplified/releases/latest --jq '.tag_name')
          gh release download "$RELEASE" \
            --repo scriptin/jmdict-simplified \
            --pattern "kanjidic2-english.json" \
            --pattern "jmdict-english-common.json" \
            --dir /tmp/jmdict

      - name: Download HSK data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh repo clone gigacee/hsk-vocabulary /tmp/hsk-vocab -- --depth 1
          mkdir /tmp/hsk
          find /tmp/hsk-vocab -name "hsk*.json" -exec cp {} /tmp/hsk/ \;

      - name: Run converters
        run: |
          python tools/convert_kanjidic.py --input /tmp/jmdict/kanjidic2-english.json
          python tools/convert_jmdict.py --input /tmp/jmdict/jmdict-english-common.json
          python tools/convert_hsk.py --input /tmp/hsk/
          python tools/gen_asl_lessons.py

      - name: Commit updated lessons
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lessons/
          if git diff --cached --quiet; then
            echo "No lesson changes to commit"
          else
            git commit -m "chore(lessons): regenerate from latest source data"
            git push
          fi
