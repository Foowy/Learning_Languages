name: Update Lesson Packs

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download jmdict-simplified data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir /tmp/jmdict
          gh release download \
            --repo scriptin/jmdict-simplified \
            --pattern "kanjidic2-en-*.json.tgz" \
            --pattern "jmdict-eng-common-*.json.tgz" \
            --dir /tmp/jmdict
          cd /tmp/jmdict
          tar -xzf kanjidic2-en-*.json.tgz
          tar -xzf jmdict-eng-common-*.json.tgz
          echo "KANJIDIC=/tmp/jmdict/$(ls kanjidic2-en-*.json | grep -v tgz)" >> $GITHUB_ENV
          echo "JMDICT=/tmp/jmdict/$(ls jmdict-eng-common-*.json | grep -v tgz)" >> $GITHUB_ENV

      - name: Download HSK data
        run: |
          mkdir /tmp/hsk
          for level in 1 2 3 4 5 6; do
            curl -fsSL "https://raw.githubusercontent.com/clem109/hsk-vocabulary/master/hsk-vocab-json/hsk-level-${level}.json" \
              -o "/tmp/hsk/hsk-level-${level}.json"
          done

      - name: Run converters
        run: |
          python tools/convert_kanjidic.py --input "$KANJIDIC"
          python tools/convert_jmdict.py --input "$JMDICT"
          python tools/convert_hsk.py --input /tmp/hsk/
          python tools/gen_asl_lessons.py

      - name: Commit updated lessons
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lessons/
          if git diff --cached --quiet; then
            echo "No lesson changes to commit"
          else
            git commit -m "chore(lessons): regenerate from latest source data"
            git push
          fi

      - name: Package and release lessons
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tar -czf lessons.tar.gz -C lessons .
          gh release upload lessons-latest lessons.tar.gz --clobber \
            --repo ${{ github.repository }} || \
          gh release create lessons-latest lessons.tar.gz \
            --repo ${{ github.repository }} \
            --title "Lessons Pack (latest)" \
            --notes "Auto-packaged lessons from commit ${{ github.sha }}.

          Set in \`docker-compose.yml\`:
          \`\`\`
          LESSONS_PACK_URL: https://github.com/${{ github.repository }}/releases/download/lessons-latest/lessons.tar.gz
          LESSONS_PACK_VERSION: ${{ github.sha }}
          \`\`\`" \
            --latest=false
